<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinela Azul & Verde</title>
  <style>
    :root {
      --azul: #0d6efd;
      --verde: #1db954;
      --escuro: #0f172a;
      --claro: #f8fafc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--azul), var(--verde));
      min-height: 100vh;
      color: var(--claro);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .imagem {
      background: radial-gradient(circle at top, #60a5fa, var(--azul));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .chinela {
      width: 230px;
      height: 90px;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 50px;
      transform: rotate(-10deg);
      position: relative;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
    }

    .chinela::before,
    .chinela::after {
      content: "";
      position: absolute;
      top: -8px;
      width: 88px;
      height: 88px;
      border: 10px solid #fff;
      border-color: transparent transparent #fff transparent;
      border-radius: 50%;
    }

    .chinela::before {
      left: 18px;
      transform: rotate(18deg);
    }

    .chinela::after {
      right: 18px;
      transform: rotate(-18deg);
    }

    .conteudo {
      padding: 36px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    p {
      opacity: 0.9;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .preco {
      font-size: 2rem;
      font-weight: bold;
      color: #bbf7d0;
      margin-bottom: 20px;
    }

    .beneficios {
      list-style: none;
      margin-bottom: 28px;
    }

    .beneficios li {
      margin-bottom: 10px;
    }

    button {
      background: linear-gradient(90deg, var(--azul), var(--verde));
      color: #fff;
      border: none;
      padding: 14px 22px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="imagem" aria-label="Imagem ilustrativa da chinela azul e verde">
      <div class="chinela"></div>
    </section>

    <section class="conteudo">
      <h1>Chinela Azul & Verde</h1>
      <p>
        Conforto, estilo e cor para o seu dia. A chinela perfeita para praia, passeio ou casa,
        com design moderno nas cores azul e verde.
      </p>
      <div class="preco">R$ 49,90</div>
      <ul class="beneficios">
        <li>✅ Solado antiderrapante</li>
        <li>✅ Material macio e resistente</li>
        <li>✅ Leve, confortável e fácil de limpar</li>
      </ul>
      <button>Comprar agora</button>
    </section>
  </main>
</body>
</html>
